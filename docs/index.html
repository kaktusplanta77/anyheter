<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anyheter — Dagens nyheter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #222; }
    header { background: #111; color: #fff; padding: 20px 0; text-align: center; }
    header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: #ff4444; }
    header p { color: #999; font-size: 14px; margin-top: 4px; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }
    .date-badge { text-align: center; margin-bottom: 24px; }
    .date-badge span { background: #eee; padding: 6px 16px; border-radius: 20px; font-size: 14px; color: #666; }
    article { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    article h2 { font-size: 22px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
    .meta { font-size: 13px; color: #888; margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { background: #e8f0fe; color: #1967d2; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .tag.sverige { background: #fff3e0; color: #e65100; }
    .tag.varlden { background: #e8f5e9; color: #2e7d32; }
    .tag.ekonomi { background: #fce4ec; color: #c62828; }
    .tag.sport { background: #f3e5f5; color: #6a1b9a; }
    .tag.tech { background: #e0f2f1; color: #00695c; }
    p { font-size: 16px; line-height: 1.7; color: #444; margin-bottom: 12px; }
    p:last-child { margin-bottom: 0; }
    .glossary { color: #666; font-size: 14px; font-style: italic; }
    .glossary strong { color: #333; }
    footer { text-align: center; padding: 32px; color: #999; font-size: 13px; }
    @media (max-width: 600px) {
      header h1 { font-size: 26px; }
      article { padding: 16px; }
      article h2 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Any</span>heter</h1>
    <p>Dagens viktigaste nyheter — opartiskt sammanställt</p>
  </header>

  <div class="container">
    <div class="date-badge">
      <span>📅 DAGENS_DATUM</span>
    </div>

    ARTIKLAR_HAR

  </div>

  <footer>
    <p>Anyheter — Genereras dagligen av AI. Självständig och opartisk nyhetsbevakning.</p>
  </footer>
</body>
</html>
