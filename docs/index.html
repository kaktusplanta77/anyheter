<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anyheter — Dagens nyheter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #222; }
    header { background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%); color: #fff; padding: 24px 0; text-align: center; }
    header h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: #ff4444; }
    header p { color: #999; font-size: 14px; margin-top: 4px; }
    .container { max-width: 720px; margin: 0 auto; padding: 20px 16px; }
    .date-badge { text-align: center; margin-bottom: 24px; }
    .date-badge span { background: #eee; padding: 6px 16px; border-radius: 20px; font-size: 14px; color: #666; }

    /* Article card (collapsed) */
    .article-card {
      background: #fff;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      cursor: pointer;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .article-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
    .article-card img.thumb {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      background: #e0e0e0;
    }
    .article-card .preview {
      padding: 16px 20px;
    }
    .article-card .preview h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .meta { font-size: 13px; color: #888; margin-bottom: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      background: #e8f0fe; color: #1967d2; padding: 2px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 600; display: inline-block;
    }
    .tag.sverige { background: #fff3e0; color: #e65100; }
    .tag.varlden { background: #e8f5e9; color: #2e7d32; }
    .tag.ekonomi { background: #fce4ec; color: #c62828; }
    .tag.sport { background: #f3e5f5; color: #6a1b9a; }
    .tag.tech { background: #e0f2f1; color: #00695c; }
    .tag.inrikes { background: #fff8e1; color: #f57f17; }

    /* Expanded article content */
    .article-card .content {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #eee;
    }
    .article-card.expanded .content { display: block; }
    .article-card .content p {
      font-size: 16px; line-height: 1.8; color: #444; margin-bottom: 14px;
    }
    .article-card .content p:last-child { margin-bottom: 0; }
    .article-card .content img.inline-img {
      width: 100%;
      border-radius: 8px;
      margin: 12px 0;
      background: #f0f0f0;
      min-height: 100px;
    }
    .glossary { color: #666; font-size: 14px; font-style: italic; }
    .glossary strong { color: #333; }

    footer { text-align: center; padding: 32px; color: #999; font-size: 13px; }

    @media (max-width: 600px) {
      header h1 { font-size: 28px; }
      .article-card .preview h2 { font-size: 17px; }
      .article-card .content p { font-size: 15px; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>Any</span>heter</h1>
    <p>Dagens viktigaste nyheter — opartiskt sammanställt</p>
  </header>

  <div class="container">
    <div class="date-badge">
      <span>📅 DAGENS_DATUM</span>
    </div>

    ARTIKLAR_HAR

  </div>

  <footer>
    <p>Anyheter — Genereras dagligen av AI. Självständig och opartisk nyhetsbevakning.</p>
  </footer>

  <script>
    document.querySelectorAll('.article-card').forEach(card => {
      card.addEventListener('click', () => {
        card.classList.toggle('expanded');
        // Scroll to content if expanding
        if (card.classList.contains('expanded')) {
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        }
      });
    });
  </script>
</body>
</html>
